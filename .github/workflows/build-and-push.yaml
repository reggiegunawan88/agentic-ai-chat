name: Build and Push ECR Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: agentic_chat_app

jobs:
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (validation only) 🐳
        run: |
          docker build -t "${{ env.ECR_REPOSITORY }}:pr-${{ github.event.pull_request.number }}" .

      - name: Comment PR with build status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🐳 **Agentic AI App**: Docker image built successfully!\n\nImage tag: `pr-${{ github.event.pull_request.number }}`'
            })

  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC ☁️
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR ☁️
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine next image tag 🐳
        id: tag
        run: |
          set -e

          branch="${GITHUB_REF_NAME//\//-}"  # sanitize slashes
          prefix="stg-"

          tags=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --query "imageDetails[].imageTags[]" \
            --output text | tr '\t' '\n' | grep "^${prefix}[0-9]\+$" || true)

          if [[ -z "$tags" ]]; then
            next=1
          else
            max=$(echo "$tags" | sed "s/^${prefix}//" | sort -n | tail -1)
            next=$((max + 1))
          fi

          tag="${prefix}${next}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push image 🐳
        run: |
          aws_account_id=$(aws sts get-caller-identity --query Account --output text)
          image_uri="${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ steps.tag.outputs.tag }}"

          docker build -t "$image_uri" .
          docker push "$image_uri"

      - name: Output image tag ✅
        run: echo "Pushed image with tag ${{ steps.tag.outputs.tag }}"
